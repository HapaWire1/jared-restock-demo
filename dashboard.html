<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestockHub Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <nav class="bg-zinc-900 p-4 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto flex justify-between">
      <span class="text-2xl font-bold">RESTOCK<span class="text-emerald-400">HUB</span></span>
      <span>Welcome, Verified Reseller #4782</span>
    </div>
  </nav>
  
  <div class="max-w-7xl mx-auto p-8">
    <h1 class="text-4xl font-bold mb-4">Dashboard – Live Drops</h1>
    <p class="text-emerald-400 mb-8">Updated 2 min ago • 214 lots active</p>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
      <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
        <div class="text-4xl font-bold text-emerald-400">12</div>
        <p class="text-zinc-400">New Today</p>
      </div>
      <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
        <div class="text-4xl font-bold text-emerald-400">$4.8M</div>
        <p class="text-zinc-400">Monthly Volume</p>
      </div>
      <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
        <div class="text-4xl font-bold text-emerald-400">97%</div>
        <p class="text-zinc-400">Satisfaction</p>
      </div>
    </div>
    
    <h2 class="text-2xl font-bold mb-6">Featured Lots</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Reuse your existing cards or add placeholders -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <img src="https://picsum.photos/id/1015/600/400" class="w-full h-48 object-cover">
        <div class="p-6">
          <h3 class="font-bold text-xl">Nike Dunk Low Overstock</h3>
          <p class="text-emerald-400 mt-2">$42.50 / pair • MOQ 50</p>
          <button class="mt-4 w-full bg-emerald-500 py-3 rounded-xl font-bold">Request Quote</button>
        </div>
      </div>
      <!-- Add 2-3 more similar for demo fullness -->
    </div>
    
    <p class="text-center text-zinc-500 mt-12">Full filters, chat, history coming soon.</p>
  </div>
</body>
</html>
