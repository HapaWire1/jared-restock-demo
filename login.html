<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Reseller – RestockHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-8 bg-zinc-900 rounded-3xl border border-zinc-800">
    <h1 class="text-3xl font-bold text-center mb-6">Verify as Reseller</h1>
    <p class="text-center text-zinc-400 mb-8">60 seconds to unlock global wholesale drops.</p>
    
    <form action="dashboard.html" class="space-y-6">
      <input type="email" placeholder="Business Email" class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-xl" required>
      <div>
        <label class="block text-sm mb-2">Upload Resale Cert / Tax ID</label>
        <input type="file" class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-xl text-zinc-400">
      </div>
      <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 p-4 rounded-xl font-bold">Submit & Verify →</button>
    </form>
    
    <p class="text-center text-xs text-zinc-500 mt-8">Demo flow – real build uses secure auth.</p>
  </div>
</body>
</html>
